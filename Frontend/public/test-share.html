<!DOCTYPE html>
<html>
<head>
    <title>Simulate Share Target</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; max-width: 400px; margin: auto; }
        .card { border: 1px solid #ccc; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #2563eb; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; margin-top: 1rem;}
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Simulate Mobile Share</h2>
        <p>Use this form to simulate a mobile app sharing an image via POST to our App's Web Share Target API.</p>
        <form action="/share" method="POST" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/*" required>
            <br>
            <button type="submit">Share Details to App</button>
        </form>
    </div>
</body>
</html>
